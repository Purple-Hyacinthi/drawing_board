name: Backend CI

on:
  push:
    paths:
      - 'drawing-board-backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'drawing-board-backend/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Run backend tests
        working-directory: drawing-board-backend
        run: |
          chmod +x gradlew
          ./gradlew test
